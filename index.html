<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[FEAL] Redirect Service</title>
    <p class="text-gray-400 text-sm"></p>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url("https://fonts.cdnfonts.com/css/gg-sans");

        :root {
            --bg-color: #000000;
            --container-bg: #313338;
            --text-color: #dbdee1;
            --danger-color: #f23f42;
            --warning-color: #f0b232;
            --success-color: #23a55a;
            --link-color: #00a8fc;
            --card-border: #1e1f22;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #000000;
            overflow: hidden;
            font-family: "gg-sans", sans-serif, !important;
        }

        @keyframes move {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-110vh) rotate(360deg);
                opacity: 0;
            }
        }

        body::before {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 1;
            pointer-events: none;
            animation: noise-anim 0.2s steps(4) infinite;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(88, 101, 242, 0.05) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        .square {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: move 15s linear infinite;
            bottom: -50px;
        }

        @keyframes noise-anim {
            0% {
                transform: translate(0, 0);
            }

            25% {
                transform: translate(-2%, 1%);
            }

            50% {
                transform: translate(2%, -1%);
            }

            75% {
                transform: translate(-1%, -2%);
            }

            100% {
                transform: translate(1%, 2%);
            }
        }

        .container {
            background: rgba(15, 15, 15, 0.7) !important;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);

            width: 100% !important;
            max-width: 420px !important;
            box-sizing: border-box !important;

            z-index: 10;
            padding: 40px !important;
            border-radius: 16px;
            text-align: center;
            margin: 0 auto;

            animation: fadeIn 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .url-box {
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgb(0, 0, 0);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .subtitle {
            margin-bottom: 25px;
            color: #b5bac1;
            font-size: 15px;
        }

        .url-box {
            background: var(--card-border);
            padding: 18px;
            border-radius: 8px;
            word-break: break-all;
            font-family: "Consolas", "Courier New", monospace;
            margin-bottom: 20px;
            border: 2px solid #4e5058;
            font-size: 14px;
            transition: border-color 0.3s ease;
            color: #ffffff;
        }

        .protocol-http {
            color: var(--danger-color);
            font-weight: bold;
            text-decoration: underline;
        }

        .protocol-https {
            color: var(--success-color);
            font-weight: bold;
        }

        .info-banner {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            font-weight: 500;
            text-align: left;
        }

        .banner-warning {
            background-color: rgba(240, 178, 50, 0.1);
            border: 1px solid var(--warning-color);
            color: var(--warning-color);
        }

        .banner-danger {
            background-color: rgba(242, 63, 66, 0.1);
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
        }

        .banner-trust {
            background-color: rgba(35, 165, 90, 0.1);
            border: 1px solid var(--success-color);
            color: var(--success-color);
        }

        .btn {
            display: inline-block;
            background-color: #5865f2;
            color: white;
            padding: 14px 40px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 600;
            transition: background-color 0.2s;
            cursor: pointer;
            border: none;
            font-size: 16px;
            width: 100%;
        }

        .domain-inspector {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px dashed #4e5058;
        }

        .domain-label {
            font-size: 11px;
            text-transform: uppercase;
            color: #949ba4;
            letter-spacing: 1px;
            margin-bottom: 5px;
            display: block;
        }

        .domain-name {
            font-size: 20px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .btn:hover:not(:disabled) {
            background-color: #4752c4;
        }

        .btn:disabled {
            background-color: #4e5058;
            color: #80848e;
            cursor: not-allowed;
        }

        .timer-msg {
            font-size: 13px;
            color: #949ba4;
            margin-top: 10px;
        }

        .footer {
            margin-top: 35px;
            font-size: 11px;
            color: #72767d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="particles-container" id="particles"></div>
    <div class="container">
        <h1 id="mainTitle">Redirect</h1>
        <p class="subtitle" id="subTitle">Please check the link before proceeding:</p>

        <div id="infoBanner" class="info-banner"></div>

        <div class="url-box" id="urlDisplay">
            link...
        </div>
        <div class="domain-inspector">
            <span class="domain-label">Main Domain:</span>
            <div class="domain-name" id="domainName">NO_LINK_ERROR</div>
        </div>

        <div class="button-group">
            <button id="redirectBtn" class="btn" disabled>Continue</button>
            <p id="timerMsg" class="timer-msg">Wait T-<span id="seconds">5</span>s to unlock...</p>
        </div>

        <div class="footer">
            FEAL Redirect Service • FEAL Ticket Bot
        </div>
    </div>

    <script>
        const particlesContainer = document.getElementById("particles");
        const particleCount = 150;

        for (let i = 0; i < particleCount; i++) {
            const square = document.createElement("div");
            square.className = "square";

            const size = Math.random() * 20 + 5;
            const left = Math.random() * 100;
            const delay = Math.random() * 15;
            const duration = Math.random() * 10 + 10;

            square.style.width = `${size}px`;
            square.style.height = `${size}px`;
            square.style.left = `${left}%`;
            square.style.animationDelay = `${delay}s`;
            square.style.animationDuration = `${duration}s`;

            particlesContainer.appendChild(square);
        }
    </script>

    <script>
        const trustedDomains = [
            "youtube.com",
            "youtu.be",
            "medal.tv",
            "streamable.com",
            "google.com",
            "roblox.com"
        ];

        const suspiciousTlds = [".cc", ".xyz", ".tk", ".click", ".top", ".zip", ".link", ".su"];

        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const rawUrl = getQueryParam("url");
        const displayElement = document.getElementById("urlDisplay");
        const infoBanner = document.getElementById("infoBanner");
        const redirectBtn = document.getElementById("redirectBtn");
        const timerMsg = document.getElementById("timerMsg");
        const secondsSpan = document.getElementById("seconds");
        const mainTitle = document.getElementById("mainTitle");

        if (!rawUrl) {
            displayElement.innerHTML = "<span style=\"color: #f23f42;\">Error: Missing link.</span>";
            timerMsg.style.display = "none";
        } else {
            let cleanUrl = rawUrl.trim();
            let lowerUrl = cleanUrl.toLowerCase();

            let isHttp = lowerUrl.startsWith("http://");
            let isHttps = lowerUrl.startsWith("https://");

            let isTrusted = trustedDomains.some(domain => lowerUrl.includes(domain));
            let isSuspiciousZone = suspiciousTlds.some(tld => lowerUrl.endsWith(tld) || lowerUrl.includes(tld + "/"));

            if (isHttp) {
                const domainPath = cleanUrl.substring(7);
                displayElement.innerHTML = `<span class="protocol-http">http://</span>${domainPath}`;
                displayElement.style.borderColor = "var(--danger-color)";
                infoBanner.innerHTML = "<b>Insecure Connection:</b> This link uses HTTP. Your data could be at risk.";
                infoBanner.className = "info-banner banner-danger";
                infoBanner.style.display = "block";
            } else if (isHttps) {
                const domainPath = cleanUrl.substring(8);

                if (isTrusted) {
                    displayElement.innerHTML = `<span class="protocol-https">https://</span>${domainPath}`;
                    displayElement.style.borderColor = "var(--success-color)";
                    infoBanner.innerHTML = "✅ This is a verified official link.";
                    infoBanner.className = "info-banner banner-trust";
                    infoBanner.style.display = "block";
                    mainTitle.innerText = "Verified Link";
                } else if (isSuspiciousZone) {
                    displayElement.innerHTML = `<span class="protocol-https">https://</span>${domainPath}`;
                    displayElement.style.borderColor = "var(--danger-color)";
                    infoBanner.innerHTML = "⚠️ <b>Potential Risk:</b> This domain zone (like .cc or .xyz) is often used for phishing.";
                    infoBanner.className = "info-banner banner-danger";
                    infoBanner.style.display = "block";
                } else {
                    displayElement.innerHTML = `<span class="protocol-https">https://</span>${domainPath}`;
                    displayElement.style.borderColor = "var(--warning-color)";
                    infoBanner.innerHTML = "ℹ️ You are leaving for an external website.";
                    infoBanner.className = "info-banner banner-warning";
                    infoBanner.style.display = "block";
                }
            } else {
                displayElement.textContent = cleanUrl;
            }

            let timeLeft = (isTrusted && isHttps) ? 3 : 5;
            secondsSpan.textContent = timeLeft;
            const countdown = setInterval(() => {
                timeLeft--;
                if (timeLeft >= 0) secondsSpan.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    redirectBtn.disabled = false;
                    timerMsg.innerHTML = "Link unlocked. Continue processing the ticket!";
                }
            }, 1000);

            redirectBtn.onclick = () => {
                let finalUrl = cleanUrl;
                if (!finalUrl.startsWith("http")) finalUrl = "https://" + finalUrl;
                window.location.href = finalUrl;
            };
        }

        function extractMainDomain(url) {
            try {
                let hostname = url.replace(/^(https?:\/\/)?(www\.)?/, "").split(/[/?#]/)[0];
                return hostname;
            } catch (e) {
                return "Unknown";
            }
        }

        const domainNameElement = document.getElementById("domainName");
        if (rawUrl) {
            let cleanUrl = rawUrl.trim();
            let mainDomain = extractMainDomain(cleanUrl);
            domainNameElement.textContent = mainDomain;
        }

        document.addEventListener("mousemove", e => {
            document.body.style.setProperty("--x", (e.clientX / window.innerWidth * 100) + "%");
            document.body.style.setProperty("--y", (e.clientY / window.innerHeight * 100) + "%");
        });
    </script>
</body>

</html>
