<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[FEAL] Auth Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/gg-sans');

        :root {
            --primary: #5865f2;
            --primary-hover: #4752c4;
            --bg-black: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'gg sans', sans-serif;
            background-color: var(--bg-black);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .square {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
            animation: move 15s linear infinite;
            bottom: -50px;
        }

        @keyframes move {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-110vh) rotate(360deg);
                opacity: 0;
            }
        }

        .glass-card {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            width: 100%;
            max-width: 420px;
            z-index: 10;
            padding: 40px;
            border-radius: 16px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-field {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(88, 101, 242, 0.2);
            outline: none;
            background: rgba(0, 0, 0, 0.6);
        }

        .login-btn {
            background-color: var(--primary);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .login-btn:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .label-text {
            color: #949ba4;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }
    </style>
</head>

<body>

    <div class="particles-container" id="particles"></div>

    <div class="glass-card">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white mb-2">Dashboard</h1>
            <h2 class="text-2x2 text-white mb-2">[W.I.P]: Welcome back! Please enter your login and password.</h2>
            <p class="text-gray-400 text-sm"></p>
        </div>

        <form onsubmit="return false;">
            <div class="mb-6">
                <label class="label-text">Login</label>
                <input type="text" class="input-field w-full px-4 py-3 rounded-lg">
            </div>

            <div class="mb-2">
                <label class="label-text">Password</label>
                <input type="password" class="input-field w-full px-4 py-3 rounded-lg">
            </div>

            <div class="mb-8">
            </div>

            <button type="submit" class="login-btn w-full text-white font-bold py-3 rounded-lg">
                Enter
            </button>

            <div class="mt-10 pt-6 border-t border-white/5 text-center">
                <div class="text-[10px] text-gray-600 uppercase tracking-widest">
                    FEAL AUTH SERVICE • DASHBOARD
                </div>
            </div>
    </div>

    <script>
        const particlesContainer = document.getElementById('particles');
        const particleCount = 150;

        for (let i = 0; i < particleCount; i++) {
            const square = document.createElement('div');
            square.className = 'square';

            const size = Math.random() * 20 + 5;
            const left = Math.random() * 100;
            const delay = Math.random() * 15;
            const duration = Math.random() * 10 + 10;

            square.style.width = `${size}px`;
            square.style.height = `${size}px`;
            square.style.left = `${left}%`;
            square.style.animationDelay = `${delay}s`;
            square.style.animationDuration = `${duration}s`;

            particlesContainer.appendChild(square);
        }
    </script>
</body>

</html>
